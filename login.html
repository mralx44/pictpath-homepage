<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PictPath</title>
    <meta name="description" content="Log in to your PictPath account to view and share your trips">
    <link rel="icon" type="image/png" href="pictpath-logo.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .auth-container {
            max-width: 450px;
            margin: 80px auto;
            padding: 20px;
        }
        .auth-box {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(10px);
        }
        .auth-box h1 {
            text-align: center;
            color: #f5efe1;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .auth-box .subtitle {
            text-align: center;
            color: rgba(245,239,225,0.6);
            margin-bottom: 30px;
        }
        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        .auth-tab {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: rgba(245,239,225,0.6);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .auth-tab.active {
            background: #f5efe1;
            color: #0d4532;
        }
        .auth-tab:hover:not(.active) {
            background: rgba(255,255,255,0.2);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: rgba(245,239,225,0.8);
            margin-bottom: 8px;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            background: rgba(0,0,0,0.2);
            color: #f5efe1;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: rgba(245,239,225,0.5);
        }
        .form-group input::placeholder {
            color: rgba(245,239,225,0.4);
        }
        .submit-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 10px;
            background: #f5efe1;
            color: #0d4532;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }
        .submit-btn:hover {
            transform: scale(1.02);
        }
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .error-message {
            background: rgba(255,100,100,0.2);
            border: 1px solid rgba(255,100,100,0.4);
            color: #ffaaaa;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .success-message {
            background: rgba(100,255,150,0.2);
            border: 1px solid rgba(100,255,150,0.4);
            color: #aaffaa;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: rgba(245,239,225,0.4);
            font-size: 12px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(245,239,225,0.2);
        }
        .divider span {
            padding: 0 15px;
        }
        .backup-link {
            text-align: center;
        }
        .backup-link a {
            color: #9ed4ff;
            text-decoration: none;
            font-size: 14px;
        }
        .backup-link a:hover {
            text-decoration: underline;
        }
        .social-login {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 5px;
        }
        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            width: 100%;
        }
        .social-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .social-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .social-btn svg {
            width: 20px;
            height: 20px;
        }
        .google-btn {
            background: #fff;
            color: #333;
        }
        .google-btn:hover {
            background: #f5f5f5;
        }
        .apple-btn {
            background: #000;
            color: #fff;
        }
        .apple-btn:hover {
            background: #1a1a1a;
        }
        .divider-social {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: rgba(245,239,225,0.4);
            font-size: 12px;
        }
        .divider-social::before, .divider-social::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(245,239,225,0.2);
        }
        .divider-social span {
            padding: 0 15px;
        }
        .nav-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(13, 69, 50, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav-bar .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #f5efe1;
            text-decoration: none;
            font-weight: 600;
            font-size: 18px;
        }
        .nav-bar .logo img {
            height: 35px;
        }
        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .nav-links a {
            color: rgba(245,239,225,0.8);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }
        .nav-links a:hover {
            color: #f5efe1;
        }
        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(13,69,50,0.3);
            border-top-color: #0d4532;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="nav-bar">
        <a href="index.html" class="logo">
            <img src="pictpath-logo.png" alt="PictPath">
            <span>PictPath</span>
        </a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="backup.html">My Backup</a>
            <a href="privacy.html">Privacy</a>
        </div>
    </nav>

    <main class="auth-container">
        <div class="auth-box">
            <h1>🗺️ Welcome</h1>
            <p class="subtitle">Sign in to view and share your trips</p>
            
            <div class="auth-tabs">
                <button class="auth-tab active" id="loginTab" onclick="switchTab('login')">Sign In</button>
                <button class="auth-tab" id="registerTab" onclick="switchTab('register')">Create Account</button>
            </div>
            
            <div id="errorMessage" class="error-message" style="display: none;"></div>
            <div id="successMessage" class="success-message" style="display: none;"></div>
            
            <!-- Social Login Buttons -->
            <div class="social-login">
                <button class="social-btn google-btn" onclick="signInWithGoogle()" id="googleBtn">
                    <svg viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Continue with Google
                </button>
                <button class="social-btn apple-btn" onclick="signInWithApple()" id="appleBtn">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09l.01-.01zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
                    </svg>
                    Continue with Apple
                </button>
            </div>
            
            <div class="divider-social"><span>or continue with email</span></div>
            
            <!-- Login Form -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="submit-btn" id="loginBtn">Sign In</button>
            </form>
            
            <!-- Register Form -->
            <form id="registerForm" style="display: none;" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="registerUsername" placeholder="adventurer123" required minlength="3" maxlength="20" pattern="[a-zA-Z0-9_]+">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="registerEmail" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="registerPassword" placeholder="Min 6 characters" required minlength="6">
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="registerConfirm" placeholder="Repeat password" required>
                </div>
                <button type="submit" class="submit-btn" id="registerBtn">Create Account</button>
            </form>
            
            <div class="divider"><span>or</span></div>
            
            <div class="backup-link">
                <a href="backup.html">View backup without account →</a>
            </div>
        </div>
    </main>

    <script>
        console.log('Script loaded!');
        
        // Supabase config
        const SUPABASE_URL = 'https://aiyaqjveeqdeqllkddyp.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFpeWFxanZlZXFkZXFsbGtkZHlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjYxNTI1MTQsImV4cCI6MjA4MTcyODUxNH0.gOpdbdx5i6qgJ_szRcsTDI1SlS_6-2MXBP0lzhTPgwM';
        
        console.log('Creating Supabase client...');
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        console.log('Supabase client created:', supabase);
        
        // Check if already logged in or handle OAuth callback
        async function checkAuth() {
            // Handle OAuth callback (hash contains access_token)
            if (window.location.hash && window.location.hash.includes('access_token')) {
                // Supabase will automatically parse the hash
                const { data: { session }, error } = await supabase.auth.getSession();
                if (session) {
                    // Create profile if it doesn't exist (for OAuth users)
                    await ensureProfile(session.user);
                    window.location.href = 'dashboard.html';
                    return;
                }
            }
            
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                window.location.href = 'dashboard.html';
            }
        }
        
        // Ensure profile exists for OAuth users
        async function ensureProfile(user) {
            const { data: existingProfile } = await supabase
                .from('profiles')
                .select('id')
                .eq('id', user.id)
                .single();
            
            if (!existingProfile) {
                // Create profile from OAuth data
                const username = user.user_metadata?.full_name?.replace(/\s+/g, '_').toLowerCase() ||
                                user.email?.split('@')[0] ||
                                'user_' + user.id.substring(0, 8);
                
                await supabase.from('profiles').insert({
                    id: user.id,
                    username: username,
                    created_at: new Date().toISOString()
                });
            }
        }
        
        // Google Sign In
        async function signInWithGoogle() {
            console.log('Google sign in clicked');
            const btn = document.getElementById('googleBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span>Connecting...';
            
            try {
                console.log('Calling Supabase OAuth...');
                const { data, error } = await supabase.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: window.location.origin + '/login'
                    }
                });
                
                console.log('OAuth response:', { data, error });
                
                if (error) throw error;
                
                // If we have a URL, redirect manually (in case auto-redirect fails)
                if (data?.url) {
                    console.log('Redirecting to:', data.url);
                    window.location.href = data.url;
                }
            } catch (error) {
                console.error('Google sign in error:', error);
                showError(error.message || 'Failed to connect to Google');
                btn.disabled = false;
                btn.innerHTML = `<svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Continue with Google`;
            }
        }
        
        // Apple Sign In
        async function signInWithApple() {
            console.log('Apple sign in clicked');
            const btn = document.getElementById('appleBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span>Connecting...';
            
            try {
                const { data, error } = await supabase.auth.signInWithOAuth({
                    provider: 'apple',
                    options: {
                        redirectTo: window.location.origin + '/login'
                    }
                });
                
                if (error) throw error;
                
                if (data?.url) {
                    window.location.href = data.url;
                }
            } catch (error) {
                console.error('Apple sign in error:', error);
                showError(error.message || 'Failed to connect to Apple');
                btn.disabled = false;
                btn.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09l.01-.01zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg> Continue with Apple`;
            }
        }
        
        checkAuth();
        
        function switchTab(tab) {
            const loginTab = document.getElementById('loginTab');
            const registerTab = document.getElementById('registerTab');
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
            
            if (tab === 'login') {
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
            } else {
                registerTab.classList.add('active');
                loginTab.classList.remove('active');
                registerForm.style.display = 'block';
                loginForm.style.display = 'none';
            }
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            document.getElementById('successMessage').style.display = 'none';
        }
        
        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            document.getElementById('errorMessage').style.display = 'none';
        }
        
        function setLoading(btnId, loading) {
            const btn = document.getElementById(btnId);
            if (loading) {
                btn.disabled = true;
                btn.innerHTML = '<span class="loading-spinner"></span>Please wait...';
            } else {
                btn.disabled = false;
                btn.textContent = btnId === 'loginBtn' ? 'Sign In' : 'Create Account';
            }
        }
        
        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            setLoading('loginBtn', true);
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email,
                    password
                });
                
                if (error) {
                    showError(error.message === 'Invalid login credentials' 
                        ? 'Wrong email or password. Please try again.' 
                        : error.message);
                    setLoading('loginBtn', false);
                    return;
                }
                
                showSuccess('Login successful! Redirecting...');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
            } catch (err) {
                showError('An error occurred. Please try again.');
                setLoading('loginBtn', false);
            }
        }
        
        async function handleRegister(e) {
            e.preventDefault();
            const username = document.getElementById('registerUsername').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const confirm = document.getElementById('registerConfirm').value;
            
            if (password !== confirm) {
                showError('Passwords do not match');
                return;
            }
            
            if (!/^[a-zA-Z0-9_]{3,20}$/.test(username)) {
                showError('Username must be 3-20 characters (letters, numbers, underscore only)');
                return;
            }
            
            setLoading('registerBtn', true);
            
            try {
                // Check if username is taken
                const { data: existingUser } = await supabase
                    .from('profiles')
                    .select('username')
                    .eq('username', username.toLowerCase())
                    .single();
                
                if (existingUser) {
                    showError('This username is already taken');
                    setLoading('registerBtn', false);
                    return;
                }
                
                // Create account
                const { data, error } = await supabase.auth.signUp({
                    email,
                    password,
                    options: {
                        data: {
                            username: username.toLowerCase(),
                            display_name: username
                        }
                    }
                });
                
                if (error) {
                    showError(error.message);
                    setLoading('registerBtn', false);
                    return;
                }
                
                // Create profile
                if (data.user) {
                    await supabase.from('profiles').upsert({
                        id: data.user.id,
                        username: username.toLowerCase(),
                        display_name: username,
                        is_public: true
                    });
                }
                
                showSuccess('Account created! Check your email to verify, then sign in.');
                setLoading('registerBtn', false);
                
                // Switch to login tab
                setTimeout(() => switchTab('login'), 2000);
            } catch (err) {
                showError('An error occurred. Please try again.');
                setLoading('registerBtn', false);
            }
        }
    </script>
</body>
</html>
