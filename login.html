<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PictPath</title>
    <meta name="description" content="Log in to your PictPath account to view and share your trips">
    <link rel="icon" type="image/png" href="pictpath-logo.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .auth-container {
            max-width: 450px;
            margin: 80px auto;
            padding: 20px;
        }
        .auth-box {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(10px);
        }
        .auth-box h1 {
            text-align: center;
            color: #f5efe1;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .auth-box .subtitle {
            text-align: center;
            color: rgba(245,239,225,0.6);
            margin-bottom: 30px;
        }
        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        .auth-tab {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: rgba(245,239,225,0.6);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .auth-tab.active {
            background: #f5efe1;
            color: #0d4532;
        }
        .auth-tab:hover:not(.active) {
            background: rgba(255,255,255,0.2);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: rgba(245,239,225,0.8);
            margin-bottom: 8px;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            background: rgba(0,0,0,0.2);
            color: #f5efe1;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: rgba(245,239,225,0.5);
        }
        .form-group input::placeholder {
            color: rgba(245,239,225,0.4);
        }
        .submit-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 10px;
            background: #f5efe1;
            color: #0d4532;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }
        .submit-btn:hover {
            transform: scale(1.02);
        }
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .error-message {
            background: rgba(255,100,100,0.2);
            border: 1px solid rgba(255,100,100,0.4);
            color: #ffaaaa;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .success-message {
            background: rgba(100,255,150,0.2);
            border: 1px solid rgba(100,255,150,0.4);
            color: #aaffaa;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: rgba(245,239,225,0.4);
            font-size: 12px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(245,239,225,0.2);
        }
        .divider span {
            padding: 0 15px;
        }
        .backup-link {
            text-align: center;
        }
        .backup-link a {
            color: #9ed4ff;
            text-decoration: none;
            font-size: 14px;
        }
        .backup-link a:hover {
            text-decoration: underline;
        }
        .nav-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(13, 69, 50, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav-bar .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #f5efe1;
            text-decoration: none;
            font-weight: 600;
            font-size: 18px;
        }
        .nav-bar .logo img {
            height: 35px;
        }
        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .nav-links a {
            color: rgba(245,239,225,0.8);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }
        .nav-links a:hover {
            color: #f5efe1;
        }
        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(13,69,50,0.3);
            border-top-color: #0d4532;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="nav-bar">
        <a href="index.html" class="logo">
            <img src="pictpath-logo.png" alt="PictPath">
            <span>PictPath</span>
        </a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="backup.html">My Backup</a>
            <a href="privacy.html">Privacy</a>
        </div>
    </nav>

    <main class="auth-container">
        <div class="auth-box">
            <h1>🗺️ Welcome</h1>
            <p class="subtitle">Sign in to view and share your trips</p>
            
            <div class="auth-tabs">
                <button class="auth-tab active" id="loginTab" onclick="switchTab('login')">Sign In</button>
                <button class="auth-tab" id="registerTab" onclick="switchTab('register')">Create Account</button>
            </div>
            
            <div id="errorMessage" class="error-message" style="display: none;"></div>
            <div id="successMessage" class="success-message" style="display: none;"></div>
            
            <!-- Login Form -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="submit-btn" id="loginBtn">Sign In</button>
            </form>
            
            <!-- Register Form -->
            <form id="registerForm" style="display: none;" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="registerUsername" placeholder="adventurer123" required minlength="3" maxlength="20" pattern="[a-zA-Z0-9_]+">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="registerEmail" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="registerPassword" placeholder="Min 6 characters" required minlength="6">
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="registerConfirm" placeholder="Repeat password" required>
                </div>
                <button type="submit" class="submit-btn" id="registerBtn">Create Account</button>
            </form>
            
            <div class="divider"><span>or</span></div>
            
            <div class="backup-link">
                <a href="backup.html">View backup without account →</a>
            </div>
        </div>
    </main>

    <script>
        // Supabase config
        const SUPABASE_URL = 'https://aiyaqjveeqdeqllkddyp.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFpeWFxanZlZXFkZXFsbGtkZHlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjYxNTI1MTQsImV4cCI6MjA4MTcyODUxNH0.gOpdbdx5i6qgJ_szRcsTDI1SlS_6-2MXBP0lzhTPgwM';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // Check if already logged in
        async function checkAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                window.location.href = 'dashboard.html';
            }
        }
        checkAuth();
        
        function switchTab(tab) {
            const loginTab = document.getElementById('loginTab');
            const registerTab = document.getElementById('registerTab');
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
            
            if (tab === 'login') {
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
            } else {
                registerTab.classList.add('active');
                loginTab.classList.remove('active');
                registerForm.style.display = 'block';
                loginForm.style.display = 'none';
            }
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            document.getElementById('successMessage').style.display = 'none';
        }
        
        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            document.getElementById('errorMessage').style.display = 'none';
        }
        
        function setLoading(btnId, loading) {
            const btn = document.getElementById(btnId);
            if (loading) {
                btn.disabled = true;
                btn.innerHTML = '<span class="loading-spinner"></span>Please wait...';
            } else {
                btn.disabled = false;
                btn.textContent = btnId === 'loginBtn' ? 'Sign In' : 'Create Account';
            }
        }
        
        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            setLoading('loginBtn', true);
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email,
                    password
                });
                
                if (error) {
                    showError(error.message === 'Invalid login credentials' 
                        ? 'Wrong email or password. Please try again.' 
                        : error.message);
                    setLoading('loginBtn', false);
                    return;
                }
                
                showSuccess('Login successful! Redirecting...');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
            } catch (err) {
                showError('An error occurred. Please try again.');
                setLoading('loginBtn', false);
            }
        }
        
        async function handleRegister(e) {
            e.preventDefault();
            const username = document.getElementById('registerUsername').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const confirm = document.getElementById('registerConfirm').value;
            
            if (password !== confirm) {
                showError('Passwords do not match');
                return;
            }
            
            if (!/^[a-zA-Z0-9_]{3,20}$/.test(username)) {
                showError('Username must be 3-20 characters (letters, numbers, underscore only)');
                return;
            }
            
            setLoading('registerBtn', true);
            
            try {
                // Check if username is taken
                const { data: existingUser } = await supabase
                    .from('profiles')
                    .select('username')
                    .eq('username', username.toLowerCase())
                    .single();
                
                if (existingUser) {
                    showError('This username is already taken');
                    setLoading('registerBtn', false);
                    return;
                }
                
                // Create account
                const { data, error } = await supabase.auth.signUp({
                    email,
                    password,
                    options: {
                        data: {
                            username: username.toLowerCase(),
                            display_name: username
                        }
                    }
                });
                
                if (error) {
                    showError(error.message);
                    setLoading('registerBtn', false);
                    return;
                }
                
                // Create profile
                if (data.user) {
                    await supabase.from('profiles').upsert({
                        id: data.user.id,
                        username: username.toLowerCase(),
                        display_name: username,
                        is_public: true
                    });
                }
                
                showSuccess('Account created! Check your email to verify, then sign in.');
                setLoading('registerBtn', false);
                
                // Switch to login tab
                setTimeout(() => switchTab('login'), 2000);
            } catch (err) {
                showError('An error occurred. Please try again.');
                setLoading('registerBtn', false);
            }
        }
    </script>
</body>
</html>
